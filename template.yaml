AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Capture backend for Celebrating Kristin. A single Lambda (behind a Function
  URL) that accepts memory submissions, stores public entries + media in the
  existing site bucket, and keeps edit-token hashes + contact emails in a
  separate private bucket. Deploy in the same region as the site (us-east-1).

Parameters:
  SiteBucketName:
    Type: String
    Description: Existing public site bucket (entries + media). Same as BUCKET in .deploy.env.
  AllowOrigin:
    Type: String
    Description: The site origin allowed to call the function, e.g. https://celebrate.kristinallen.com
  AdminToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Optional admin override token (edit/delete any entry). Blank disables it.
  TurnstileSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: Optional Cloudflare Turnstile secret. Blank skips captcha verification.
  NotifyFrom:
    Type: String
    Default: ''
    Description: Verified SES sender for reflection emails (e.g. reflections@celebrate.kristinallen.com). Blank disables emails.
  SiteUrl:
    Type: String
    Default: ''
    Description: Public site URL for links in notification emails (e.g. https://celebrate.kristinallen.com).
  EmailAddress:
    Type: String
    Default: celebrate@kristinallen.com
    Description: Inbound address. Fresh emails become new memories; replies to notifications (subject has [ref:id]) become reflections.
  AllowSenders:
    Type: String
    Default: ''
    Description: Optional comma-separated sender allowlist for inbound email. Blank accepts anyone (SES spam/virus scan still applies).
  MediaConvertEndpoint:
    Type: String
    Default: ''
    Description: Optional MediaConvert account endpoint URL. Blank → the capture function discovers it at runtime (needs mediaconvert:DescribeEndpoints, which is granted below).
  MediaConvertQueueArn:
    Type: String
    Default: ''
    Description: Optional MediaConvert queue ARN. Blank → the account's default on-demand queue.

Resources:

  # Private store the function alone can read: edit-token hashes + contact emails.
  PrivateBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CaptureFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: celebrate-kristin-capture
      Runtime: nodejs20.x
      Handler: lambda.handler
      CodeUri: capture/
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          SITE_BUCKET: !Ref SiteBucketName
          PRIVATE_BUCKET: !Ref PrivateBucket
          ADMIN_TOKEN: !Ref AdminToken
          TURNSTILE_SECRET: !Ref TurnstileSecret
          NOTIFY_FROM: !Ref NotifyFrom
          SITE_URL: !Ref SiteUrl
          EMAIL_ADDRESS: !Ref EmailAddress
          MEDIACONVERT_ROLE_ARN: !GetAtt MediaConvertRole.Arn
          MEDIACONVERT_ENDPOINT: !Ref MediaConvertEndpoint
          MEDIACONVERT_QUEUE_ARN: !Ref MediaConvertQueueArn
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - !Ref AllowOrigin
          AllowMethods:
            - POST
          AllowHeaders:
            - content-type
          MaxAge: 3000
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref SiteBucketName
        - S3CrudPolicy:
            BucketName: !Ref PrivateBucket
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'
        # Submit transcode jobs and pass the MediaConvert role to them.
        - Statement:
            - Effect: Allow
              Action: [mediaconvert:CreateJob, mediaconvert:DescribeEndpoints]
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action: iam:PassRole
              Resource: !GetAtt MediaConvertRole.Arn

  # ── Video transcoding (MediaConvert → HLS) ───────────────────────────────────
  # Role MediaConvert assumes to read uploaded masters and write HLS renditions
  # + posters back into the site bucket. Scoped to the two media prefixes.
  MediaConvertRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: mediaconvert.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: site-media-rw
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Read any uploaded master: new uploads land in media/originals/,
              # but pre-existing uploads (and the reprocess script) read from
              # media/u/. All of media/ is already public via CloudFront, so a
              # read grant across it is no extra exposure.
              - Effect: Allow
                Action: [s3:GetObject]
                Resource: !Sub 'arn:aws:s3:::${SiteBucketName}/media/*'
              - Effect: Allow
                Action: [s3:PutObject]
                Resource: !Sub 'arn:aws:s3:::${SiteBucketName}/media/hls/*'
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource: !Sub 'arn:aws:s3:::${SiteBucketName}'

  # Invoked by EventBridge when a MediaConvert job finishes; patches the entry
  # (or reflection) with the HLS manifest + poster, then rebuilds the index.
  TranscodeCompleteFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: celebrate-kristin-transcode-complete
      Runtime: nodejs20.x
      Handler: handler.handler
      CodeUri: capture/transcode-complete/
      MemorySize: 256
      Timeout: 60
      Environment:
        Variables:
          SITE_BUCKET: !Ref SiteBucketName
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref SiteBucketName
      Events:
        JobDone:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source: [aws.mediaconvert]
              detail-type: ['MediaConvert Job State Change']
              detail:
                status: [COMPLETE, ERROR, CANCELED]

  # ── Inbound email (SES) ──────────────────────────────────────────────────────
  # Raw incoming emails land here (private, auto-expired). SES needs PutObject.
  InboundBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-raw-email
            Status: Enabled
            ExpirationInDays: 90

  InboundBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InboundBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSESPut
            Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${InboundBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceAccount: !Ref AWS::AccountId

  EmailFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: celebrate-kristin-email
      Runtime: nodejs20.x
      Handler: handler.handler
      CodeUri: capture/email/
      MemorySize: 512
      Timeout: 60
      Environment:
        Variables:
          SITE_BUCKET: !Ref SiteBucketName
          PRIVATE_BUCKET: !Ref PrivateBucket
          RAW_BUCKET: !Ref InboundBucket
          RAW_PREFIX: inbound/
          EMAIL_ADDRESS: !Ref EmailAddress
          ALLOW_SENDERS: !Ref AllowSenders
          NOTIFY_FROM: !Ref NotifyFrom
          SITE_URL: !Ref SiteUrl
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref SiteBucketName
        - S3CrudPolicy:
            BucketName: !Ref PrivateBucket
        - S3ReadPolicy:
            BucketName: !Ref InboundBucket
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'

  # Let SES invoke the email function.
  EmailFnSesInvoke:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EmailFn
      Action: lambda:InvokeFunction
      Principal: ses.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # Receipt rule set + rule. NOTE: CloudFormation cannot mark a rule set ACTIVE;
  # run once after deploy:  aws ses set-active-receipt-rule-set \
  #   --rule-set-name celebrate-kristin --region us-east-1
  InboundRuleSet:
    Type: AWS::SES::ReceiptRuleSet
    Properties:
      RuleSetName: celebrate-kristin

  InboundRule:
    Type: AWS::SES::ReceiptRule
    DependsOn: [InboundBucketPolicy, EmailFnSesInvoke]
    Properties:
      RuleSetName: !Ref InboundRuleSet
      Rule:
        Name: celebrate-inbound
        Enabled: true
        ScanEnabled: true
        TlsPolicy: Optional
        Recipients:
          - !Ref EmailAddress
        Actions:
          - S3Action:
              BucketName: !Ref InboundBucket
              ObjectKeyPrefix: inbound/
          - LambdaAction:
              FunctionArn: !GetAtt EmailFn.Arn
              InvocationType: Event

Outputs:
  FunctionUrl:
    Description: Base URL of the capture function (append /presign, /submit, etc.)
    Value: !GetAtt CaptureFnUrl.FunctionUrl
  PrivateBucket:
    Description: Private bucket holding token hashes + contact emails
    Value: !Ref PrivateBucket
  InboundBucket:
    Description: Bucket where SES stores raw inbound emails
    Value: !Ref InboundBucket
  ReceiptRuleSetName:
    Description: Activate this after deploy with `aws ses set-active-receipt-rule-set`
    Value: !Ref InboundRuleSet
  MediaConvertRoleArn:
    Description: Role ARN MediaConvert assumes (used by scripts/transcode-backfill.mjs)
    Value: !GetAtt MediaConvertRole.Arn
